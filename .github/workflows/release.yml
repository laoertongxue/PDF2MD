name: Release Desktop App

on:
  push:
    tags:
      - "v*"

jobs:
  macos-apple-silicon:
    name: Build macOS Apple Silicon release assets
    runs-on: macos-14
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-name: ${{ steps.metadata.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: parsing-core-app/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Validate release tag and resolve version
        id: version
        shell: bash
        run: |
          version="$(python scripts/release_version.py --github-ref-name "$GITHUB_REF_NAME")"
          printf 'VERSION=%s\n' "$version" >> "$GITHUB_ENV"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Resolve auditable artifact name
        id: metadata
        run: printf 'artifact-name=pdf2md-v%s-run-%s\n' "$VERSION" "${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Require native Apple Silicon runner
        run: |
          test "$(uname -m)" = "arm64" || {
            echo "release requires the arm64 macos-14 runner" >&2
            exit 1
          }

      - name: Install frontend dependencies
        working-directory: parsing-core-app
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -e '.[dev,llm,serve]'

      - name: Run Python quality gates
        run: |
          ruff check src tests
          pytest

      - name: Run frontend quality gates
        working-directory: parsing-core-app
        run: |
          npm test
          npm run build

      - name: Prepare embedded Python runtime
        run: ./parsing-core-app/scripts/prepare-sidecar-python.sh

      - name: Build Apple Vision OCR helper
        run: ./parsing-core-app/scripts/build-vision-ocr.sh

      - name: Run Rust quality gate
        working-directory: parsing-core-app/src-tauri
        run: cargo check

      - name: Build desktop app natively
        working-directory: parsing-core-app
        run: npm run tauri build

      - name: Verify and stage release assets
        shell: bash
        run: |
          bundle="parsing-core-app/src-tauri/target/release/bundle"
          app="$bundle/macos/PDF2MD.app"
          dmg="$bundle/dmg/PDF2MD_${VERSION}_aarch64.dmg"
          test -d "$app"
          test -f "$dmg"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")" = "$VERSION"
          app_executables=("$app/Contents/MacOS/parsing-core-app")
          test "${#app_executables[@]}" -eq 1
          file "${app_executables[0]}" | grep -q 'arm64'
          file "$app/Contents/Resources/python-runtime/bin/python3.13" | grep -q 'arm64'
          ./scripts/check-release-sidecar.sh "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          ./scripts/test-release-sidecar.sh "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          PDF2MD_APP_PATH="$app" pytest -q tests/test_version_consistency.py

          mkdir release-assets
          app_zip="release-assets/PDF2MD_${VERSION}_aarch64.app.zip"
          dmg_copy="release-assets/$(basename "$dmg")"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$app_zip"
          cp "$dmg" "$dmg_copy"
          (cd release-assets && shasum -a 256 "$(basename "$app_zip")" > "$(basename "$app_zip").sha256")
          (cd release-assets && shasum -a 256 "$(basename "$dmg_copy")" > "$(basename "$dmg_copy").sha256")

      - name: Upload release assets to this workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact-name }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 90

      - name: Attest release asset provenance
        uses: actions/attest@v4
        with:
          subject-path: release-assets/*

  release:
    name: Publish GitHub Release from workflow artifact
    needs: macos-apple-silicon
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download assets from this workflow run
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.macos-apple-silicon.outputs.artifact-name }}
          path: release-assets

      - name: Verify downloaded asset set
        env:
          VERSION: ${{ needs.macos-apple-silicon.outputs.version }}
        run: |
          test -f "release-assets/PDF2MD_${VERSION}_aarch64.dmg"
          test -f "release-assets/PDF2MD_${VERSION}_aarch64.dmg.sha256"
          test -f "release-assets/PDF2MD_${VERSION}_aarch64.app.zip"
          test -f "release-assets/PDF2MD_${VERSION}_aarch64.app.zip.sha256"
          (cd release-assets && sha256sum --check *.sha256)

      - name: Create GitHub Release from verified CI assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          body_path: docs/releases/${{ needs.macos-apple-silicon.outputs.version }}.md
          generate_release_notes: true
