name: Release Desktop App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-apple-silicon:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-14-xlarge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: parsing-core-app/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Require Apple Silicon runner
        run: |
          test "$(uname -m)" = "arm64" || {
            echo "release requires an arm64 runner" >&2
            exit 1
          }

      - name: Install frontend dependencies
        working-directory: parsing-core-app
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -e '.[dev,serve]'

      - name: Run Python quality gates
        run: |
          ruff check src tests
          pytest

      - name: Run frontend quality gates
        working-directory: parsing-core-app
        run: |
          npm test
          npm run build

      - name: Prepare embedded Python runtime
        run: ./parsing-core-app/scripts/prepare-sidecar-python.sh

      - name: Run Rust quality gate
        working-directory: parsing-core-app/src-tauri
        run: cargo check

      - name: Build desktop app
        working-directory: parsing-core-app
        run: npm run tauri build

      - name: Verify and checksum release artifacts
        shell: bash
        run: |
          apps=()
          while IFS= read -r artifact; do apps+=("$artifact"); done < <(find parsing-core-app/src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name 'PDF2MD.app')
          dmgs=()
          while IFS= read -r artifact; do dmgs+=("$artifact"); done < <(find parsing-core-app/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name 'PDF2MD_0.1.2_aarch64.dmg')
          test "${#apps[@]}" -eq 1 || { echo "expected exactly one 0.1.2 app" >&2; exit 1; }
          test "${#dmgs[@]}" -eq 1 || { echo "expected exactly one 0.1.2 dmg" >&2; exit 1; }
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "${apps[0]}/Contents/Info.plist")" = "0.1.2"
          ./scripts/check-release-sidecar.sh "${apps[0]}"
          codesign --verify --deep --strict --verbose=2 "${apps[0]}"
          ./scripts/test-release-sidecar.sh "${apps[0]}"
          codesign --verify --deep --strict --verbose=2 "${apps[0]}"
          PDF2MD_APP_PATH="${apps[0]}" pytest -q tests/test_version_consistency.py
          app_zip="parsing-core-app/src-tauri/target/release/bundle/macos/PDF2MD_0.1.2_aarch64.app.zip"
          ditto -c -k --sequesterRsrc --keepParent "${apps[0]}" "$app_zip"
          (cd "$(dirname "${dmgs[0]}")" && shasum -a 256 "$(basename "${dmgs[0]}")") > "${dmgs[0]}.sha256"
          printf 'APP_PATH=%s\nDMG_PATH=%s\nSHA_PATH=%s\n' "$app_zip" "${dmgs[0]}" "${dmgs[0]}.sha256" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APP_PATH }}
            ${{ env.DMG_PATH }}
            ${{ env.SHA_PATH }}
          fail_on_unmatched_files: true
          generate_release_notes: true
